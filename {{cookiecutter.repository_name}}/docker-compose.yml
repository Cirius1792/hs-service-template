version: "3.9"

services:
  {{ cookiecutter.service_name }}:
    image: your-image:tag
    container_name: ${SERVICE_NAME}
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    networks:
      - proxy
    volumes:
      - /data/${SERVICE_NAME}:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:{{ cookiecutter.default_port }}"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.${SERVICE_NAME}.rule=Host(`${SERVICE_NAME}.${BASE_DOMAIN:-{{ cookiecutter.base_domain }}}`)
      - traefik.http.routers.${SERVICE_NAME}.entrypoints=websecure
      - traefik.http.routers.${SERVICE_NAME}.tls=true
      - traefik.http.routers.${SERVICE_NAME}.tls.certresolver=letsencrypt
      - homepage.enable=true
      - homepage.name={{ cookiecutter.service_name | title }}
      - homepage.group={{ cookiecutter.service_group }}
      - homepage.icon={{ cookiecutter.service_icon }}
      - homepage.href=https://${SERVICE_NAME}.${BASE_DOMAIN:-{{ cookiecutter.base_domain }}}

networks:
  proxy:
    external: true
