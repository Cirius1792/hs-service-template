name: Cruft template update

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cruft-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install cruft
        run: pip install cruft

      - name: Trust cruft template host
        id: template_source
        run: |
          set -e
          mkdir -p ~/.ssh
          #
          CRUFT_SSH_INFO=$(python3 <<'PY'
          import json
          import sys
          from pathlib import Path
          from urllib.parse import urlparse
          #
          cruft_file = Path(".cruft.json")
          if not cruft_file.exists():
              sys.exit("Missing .cruft.json; this workflow must run in a cruft-generated repository.")
          #
          template = json.loads(cruft_file.read_text()).get("template", "")
          parsed = urlparse(template)
          #
          if parsed.scheme != "ssh":
              print("")
              raise SystemExit
          #
          if not parsed.hostname:
              sys.exit(f"Could not parse SSH template URL from .cruft.json: {template}")
          #
          print(parsed.hostname, parsed.port or 22)
          PY
          )
          #
          if [ -n "$CRUFT_SSH_INFO" ]; then
            echo "requires_ssh=true" >> "$GITHUB_OUTPUT"
            set -- $CRUFT_SSH_INFO
            CRUFT_SSH_HOST="$1"
            CRUFT_SSH_PORT="$2"
            ssh-keyscan -H -p "$CRUFT_SSH_PORT" "$CRUFT_SSH_HOST" > ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
          else
            echo "requires_ssh=false" >> "$GITHUB_OUTPUT"
          fi
          #
      - name: Start ssh-agent
        if: steps.template_source.outputs.requires_ssh == 'true'
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: {{ '${{ secrets.DEPLOY_SSH_KEY }}' }}

      - name: Check for template updates
        id: check
        run: |
          set -e
          if cruft check; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          #
      - name: Apply template updates
        if: steps.check.outputs.has_changes == 'true'
        id: update
        env:
          GITEA_SERVER_URL: {{ '${{ gitea.server_url }}' }}
        run: |
          set -e
          GITEA_HOST=$(python3 <<'PY'
          import os
          from urllib.parse import urlparse
          #
          server_url = os.environ["GITEA_SERVER_URL"]
          parsed = urlparse(server_url)
          if not parsed.hostname:
              raise SystemExit(f"Could not parse Gitea host from GITEA_SERVER_URL: {server_url}")
          print(parsed.hostname)
          PY
          )
          #
          git config user.name "cruft-bot"
          git config user.email "cruft-bot@$GITEA_HOST"
          cruft update --skip-apply-ask --refresh-private-variables
          #
          if git diff --cached --quiet; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "No file changes after cruft update — skipping PR."
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            git commit -m "chore: template update via cruft"
          fi
          #
      - name: Push update branch
        if: steps.update.outputs.has_diff == 'true'
        run: |
          set -e
          git checkout -b cruft/update
          git push origin cruft/update --force
          #
      - name: Create PR on Gitea
        if: steps.update.outputs.has_diff == 'true'
        env:
          # GITEA_* is a reserved prefix; use PR_GITEA_TOKEN for a user PAT
          PR_GITEA_TOKEN: {{ '${{ secrets.PR_GITEA_TOKEN }}' }}
        run: |
          set -e
          #
          REPO_FULL="{{ '${{ gitea.repository }}' }}"
          REPO_OWNER="{{ '${{ gitea.repository_owner }}' }}"
          REPO_NAME="${REPO_FULL#${REPO_OWNER}/}"
          if [ -z "$REPO_NAME" ] || [ "$REPO_NAME" = "$REPO_FULL" ]; then
            REPO_NAME="$REPO_FULL"
          fi
          API_URL="{{ '${{ gitea.api_url }}' }}"
          PR_URL="${API_URL}/repos/${REPO_OWNER}/${REPO_NAME}/pulls"
          echo "→ Creating PR at $PR_URL"
          #
          TEMPLATE_URL=$(python3 <<'PY'
          import json
          from pathlib import Path
          #
          cruft_file = Path(".cruft.json")
          template = json.loads(cruft_file.read_text()).get("template", "")
          print(template or "the upstream template")
          PY
          )
          #
          export TEMPLATE_URL
          PAYLOAD=$(python3 <<'PY'
          import json
          import os
          #
          template_url = os.environ.get("TEMPLATE_URL", "the upstream template")
          print(json.dumps({
              "title": "chore: template update via cruft",
              "head": "cruft/update",
              "base": "main",
              "body": f"Automated update from {template_url}.\n\nReview the changes and merge to accept, or close to reject.",
          }))
          PY
          )
          #
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "$PR_URL" \
            -H "Authorization: token $PR_GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          #
          HTTP_STATUS=$(printf '%s\n' "$RESPONSE" | tail -n1)
          #
          RESPONSE_BODY=$(printf '%s\n' "$RESPONSE" | sed '$d')
          #
          case "$HTTP_STATUS" in
            201) echo "PR created successfully." ;;
            409) echo "PR already exists for branch cruft/update — skipping." ;;
            403|404)
              echo "::error::PR creation failed (HTTP $HTTP_STATUS)"
              printf '%s\n' "$RESPONSE_BODY"
              if printf '%s\n' "$RESPONSE_BODY" | grep -qF 'UnitTypeCode'; then
                echo ""
                echo "Diagnosis: The Gitea-actions built-in user cannot create pull requests."
                echo "This is a known Gitea limitation (gitea#32302)."
                echo ""
                echo "Fix: Set the PR_GITEA_TOKEN secret to a user-level Personal Access Token:"
                echo "  1. Go to ${API_URL%/*/*}/user/settings/applications"
                echo "  2. Generate a token with 'write:repository' (or 'write:issue') scope"
                echo "  3. Add it as secret PR_GITEA_TOKEN in this repo's Actions settings"
                echo "     (GITEA_* names are reserved; PR_GITEA_TOKEN works around this)"
                echo ""
                echo "See: https://github.com/go-gitea/gitea/issues/32302"
              elif printf '%s\n' "$RESPONSE_BODY" | grep -qF 'token is required'; then
                echo ""
                echo "Diagnosis: No valid PR_GITEA_TOKEN provided."
                echo ""
                echo "Fix: Add a user-level PAT as secret PR_GITEA_TOKEN in repository Actions settings."
              fi
              exit 1
              ;;
            *)
              echo "Unexpected HTTP status: $HTTP_STATUS"
              printf '%s\n' "$RESPONSE_BODY"
              exit 1
              ;;
          esac
