name: Deploy stack to Portainer

on:
  push:
    branches:
      - main
    paths:
      - 'docker-compose.yml'
      - 'stack.env'
      - '.github/workflows/deploy-stack.yml'
      - '.github/workflows/reusable-portainer-redeploy.yml'
  workflow_dispatch:

env:
  COMPOSE_FILE_PATH: docker-compose.yml
  REPO_REF: refs/heads/main
  ENV_FILE: stack.env

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Validate Compose file
        run: |
          docker compose --env-file $ENV_FILE config --quiet
        env:
          COMPOSE_FILE: docker-compose.yml

  deploy:
    needs: validate
    uses: ./.github/workflows/reusable-portainer-redeploy.yml
    with:
      compose_file_path: docker-compose.yml
      env_file: stack.env
      repo_ref: refs/heads/main
      portainer_url: {{ '${{ vars.PORTAINER_URL }}' }}
      portainer_endpoint_id: {{ '${{ vars.PORTAINER_ENVIRONMENT_ID }}' }}
    secrets:
      portainer_access_token: {{ '${{ secrets.PORTAINER_ACCESS_TOKEN }}' }}
      git_username: {{ '${{ secrets.GIT_USERNAME }}' }}
      git_token: {{ '${{ secrets.GIT_TOKEN }}' }}
