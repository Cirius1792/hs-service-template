name: Deploy stack to Portainer

on:
  push:
    branches:
      - main
    paths:
      - 'docker-compose.yml'
      - 'stack.env'
      - 'configurations/**'
      - '.github/workflows/deploy-stack.yml'

env:
  COMPOSE_FILE_PATH: docker-compose.yml
  REPO_REF: refs/heads/main
  ENV_FILE: stack.env

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Validate Compose file
        run: |
          docker compose --env-file $ENV_FILE config --quiet
        env:
          COMPOSE_FILE: docker-compose.yml  

  deploy:
    runs-on: ubuntu-latest
    depends_on: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assess configuration deployment
        id: config_plan
        run: |
          set -euo pipefail

          CONFIG_DIR="configurations/data"
          LOCATIONS_FILE="configurations/locations.ini"
          MAP_FILE="$RUNNER_TEMP/config-deploy-map"

          if [ ! -d "$CONFIG_DIR" ]; then
            echo "Configuration directory '$CONFIG_DIR' not found; skipping."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          data_files=()
          for path in "$CONFIG_DIR"/*; do
            if [ -f "$path" ]; then
              data_files+=("$(basename "$path")")
            fi
          done

          data_count=${#data_files[@]}

          declare -A locations
          entry_count=0

          if [ -f "$LOCATIONS_FILE" ]; then
            while IFS= read -r raw_line || [ -n "$raw_line" ]; do
              line="$raw_line"
              line="${line#"${line%%[![:space:]]*}"}"
              line="${line%"${line##*[![:space:]]}"}"

              if [ -z "$line" ]; then
                continue
              fi

              case "$line" in
                \#*)
                  continue
                  ;;
              esac

              if [[ "$line" != *:* ]]; then
                echo "Invalid line in $LOCATIONS_FILE: $line" >&2
                exit 1
              fi

              file_name="${line%%:*}"
              target_path="${line#*:}"

              if [ -z "$file_name" ] || [ -z "$target_path" ]; then
                echo "Invalid mapping in $LOCATIONS_FILE: $line" >&2
                exit 1
              fi

              if [ -n "${locations[$file_name]:-}" ]; then
                echo "Duplicate mapping for '$file_name' in $LOCATIONS_FILE" >&2
                exit 1
              fi

              locations["$file_name"]="$target_path"
              entry_count=$((entry_count + 1))
            done < "$LOCATIONS_FILE"
          fi

          if [ "$entry_count" -eq 0 ] && [ "$data_count" -eq 0 ]; then
            echo "No configuration files to deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$entry_count" -eq 0 ] && [ "$data_count" -gt 0 ]; then
            echo "Configuration files exist in '$CONFIG_DIR' but $LOCATIONS_FILE has no entries." >&2
            exit 1
          fi

          if [ "$entry_count" -gt 0 ] && [ "$data_count" -eq 0 ]; then
            echo "$LOCATIONS_FILE contains entries but '$CONFIG_DIR' is empty." >&2
            exit 1
          fi

          for file_name in "${!locations[@]}"; do
            if [ ! -f "$CONFIG_DIR/$file_name" ]; then
              echo "$LOCATIONS_FILE references missing file '$file_name' in '$CONFIG_DIR'." >&2
              exit 1
            fi
          done

          for file_name in "${data_files[@]}"; do
            if [ -z "${locations[$file_name]:-}" ]; then
              echo "Missing deployment path for '$file_name' in $LOCATIONS_FILE." >&2
              exit 1
            fi
          done

          : > "$MAP_FILE"
          for file_name in "${data_files[@]}"; do
            printf '%s|%s\n' "$file_name" "${locations[$file_name]}" >> "$MAP_FILE"
          done

          echo "map_file=$MAP_FILE" >> "$GITHUB_OUTPUT"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Configure known_hosts
        if: steps.config_plan.outputs.should_deploy == 'true' && secrets.DEPLOY_KNOWN_HOSTS != ''
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "{{ '${{ secrets.DEPLOY_KNOWN_HOSTS }}' }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Start ssh-agent
        if: steps.config_plan.outputs.should_deploy == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: {{ '${{ secrets.DEPLOY_SSH_KEY }}' }}

      - name: Install jq and uuidgen
        run: sudo apt-get update && sudo apt-get install -y jq uuid-runtime

      - name: Resolve stack name
        id: name
        run: |
          set -e

          REPO="${GITHUB_REPOSITORY:-$GITEA_REPOSITORY}"
          STACK_NAME="${REPO##*/}"

          echo "Stack name resolved to: $STACK_NAME"
          echo "stack_name=$STACK_NAME" >> $GITHUB_OUTPUT

      - name: Resolve stack ID (create if missing)
        id: stack
        env:
          PORTAINER_URL: {{ '${{ vars.PORTAINER_URL }}' }}
          PORTAINER_API_KEY: {{ '${{ secrets.PORTAINER_ACCESS_TOKEN }}' }}
          PORTAINER_ENDPOINT_ID: {{ '${{ vars.PORTAINER_ENVIRONMENT_ID }}' }}
          GIT_USERNAME: {{ '${{ secrets.GIT_USERNAME }}' }}
          GIT_TOKEN: {{ '${{ secrets.GIT_TOKEN }}' }}
          GIT_REPO_URL: {{ '${{ github.server_url }}/${{ github.repository }}' }}
        run: |
          set -eo pipefail

          require_env() {
            local name="$1"
            if [ -z "${!name:-}" ]; then
              echo "ERROR: Required environment variable '$name' is not set"
              exit 2
            fi
          }

          for var in PORTAINER_URL PORTAINER_API_KEY PORTAINER_ENDPOINT_ID GIT_USERNAME GIT_TOKEN COMPOSE_FILE_PATH REPO_REF; do
            require_env "$var"
          done

          STACK_NAME={{ '"${{ steps.name.outputs.stack_name }}"' }}

          if [ -f "$ENV_FILE" ]; then
            ENV_JSON=$(grep -v '^\s*#' "$ENV_FILE" | grep -v '^\s*$' | \
              jq -R -s -c '
                split("\n") |
                map(select(length > 0)) |
                map(split("=") | {name: .[0], value: .[1]})
              ')
          else
            ENV_JSON='[]'
          fi

          if [ -z "$STACK_NAME" ]; then
            echo "ERROR: Stack name output is empty"
            exit 2
          fi

          echo "Resolving stack '$STACK_NAME' on endpoint $PORTAINER_ENDPOINT_ID"

          STACKS_RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            "$PORTAINER_URL/api/stacks")

          STACKS_HTTP_STATUS=$(printf '%s\n' "$STACKS_RESPONSE" | tail -n1)
          STACKS_BODY=$(printf '%s\n' "$STACKS_RESPONSE" | sed '$d')

          echo "GET /api/stacks status: $STACKS_HTTP_STATUS"

          if [ "${STACKS_HTTP_STATUS:-0}" -ge 400 ]; then
            echo "Portainer returned an error while listing stacks:"
            printf '%s\n' "$STACKS_BODY"
            exit 1
          fi

          if ! printf '%s\n' "$STACKS_BODY" | jq -e . >/dev/null 2>&1; then
            echo "Response from Portainer is not valid JSON:"
            printf '%s\n' "$STACKS_BODY"
            exit 1
          fi

          STACK_ID=$(printf '%s\n' "$STACKS_BODY" | \
            jq -r ".[] | select(.Name == \"$STACK_NAME\") | .Id")

          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            UUID=$(uuidgen)
            echo "Stack not found. Creating with Webhook $UUID..."
            PAYLOAD=$(jq -n \
              --arg name "$STACK_NAME" \
              --arg repo "$GIT_REPO_URL" \
              --arg ref "$REPO_REF" \
              --arg compose "$COMPOSE_FILE_PATH" \
              --arg user "$GIT_USERNAME" \
              --arg pass "$GIT_TOKEN" \
              --arg uuid "$UUID" \
              --argjson env "$ENV_JSON" \
              '{
                name: $name,
                repositoryURL: $repo,
                repositoryReferenceName: $ref,
                composeFile: $compose,
                repositoryAuthentication: true,
                repositoryUsername: $user,
                repositoryPassword: $pass,
                env: $env,
                additionalFiles: [],
                fromAppTemplate: false,
                tlsskipVerify: false,
                autoUpdate: {
                  forcePullImage: false,
                  forceUpdate: false,
                  interval: "5m",
                  webhook: $uuid
                }
              }')

            CREATE_RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
              -H "X-API-Key: $PORTAINER_API_KEY" \
              -H "Content-Type: application/json" \
              "$PORTAINER_URL/api/stacks/create/standalone/repository?endpointId=$PORTAINER_ENDPOINT_ID" \
              -d "$PAYLOAD")

            CREATE_HTTP_STATUS=$(printf '%s\n' "$CREATE_RESPONSE" | tail -n1)
            CREATE_BODY=$(printf '%s\n' "$CREATE_RESPONSE" | sed '$d')

            echo "POST /api/stacks/create status: $CREATE_HTTP_STATUS"

            if [ "${CREATE_HTTP_STATUS:-0}" -ge 400 ]; then
              echo "Failed to create stack:"
              printf '%s\n' "$CREATE_BODY"
              exit 1
            fi

            STACK_ID=$(printf '%s\n' "$CREATE_BODY" | jq -r '.Id // empty')

            if [ -z "$STACK_ID" ]; then
              echo "Stack creation response did not include an Id:"
              printf '%s\n' "$CREATE_BODY"
              exit 1
            fi

            echo "Stack created with ID: $STACK_ID"
          else
            echo "Stack exists with ID: $STACK_ID"
          fi

          echo "stack_id=$STACK_ID" >> "$GITHUB_OUTPUT"

      - name: Retrieve webhook ID
        id: webhook
        env:
          PORTAINER_URL: {{ '${{ vars.PORTAINER_URL }}' }}
          PORTAINER_API_KEY: {{ '${{ secrets.PORTAINER_ACCESS_TOKEN }}' }}
        run: |
          set -eo pipefail

          require_env() {
            local name="$1"
            if [ -z "${!name:-}" ]; then
              echo "ERROR: Required environment variable '$name' is not set"
              exit 2
            fi
          }

          for var in PORTAINER_URL PORTAINER_API_KEY; do
            require_env "$var"
          done

          STACK_ID={{ '"${{ steps.stack.outputs.stack_id }}"' }}

          if [ -z "$STACK_ID" ]; then
            echo "ERROR: Stack ID output is empty"
            exit 2
          fi

          WEBHOOK_RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            "$PORTAINER_URL/api/stacks/$STACK_ID")

          WEBHOOK_HTTP_STATUS=$(printf '%s\n' "$WEBHOOK_RESPONSE" | tail -n1)
          WEBHOOK_BODY=$(printf '%s\n' "$WEBHOOK_RESPONSE" | sed '$d')

          echo "GET /api/stacks/$STACK_ID status: $WEBHOOK_HTTP_STATUS"

          if [ "${WEBHOOK_HTTP_STATUS:-0}" -ge 400 ]; then
            echo "Failed to fetch stack details:"
            printf '%s\n' "$WEBHOOK_BODY"
            exit 1
          fi

          if ! printf '%s\n' "$WEBHOOK_BODY" | jq -e . >/dev/null 2>&1; then
            echo "Stack response was not valid JSON:"
            printf '%s\n' "$WEBHOOK_BODY"
            exit 1
          fi

          WEBHOOK_ID=$(printf '%s\n' "$WEBHOOK_BODY" | jq -r '.AutoUpdate.Webhook // empty')

          if [ -z "$WEBHOOK_ID" ]; then
            echo "ERROR: Webhook not found in stack metadata"
            printf '%s\n' "$WEBHOOK_BODY"
            exit 1
          fi

          echo "webhook_id=$WEBHOOK_ID" >> $GITHUB_OUTPUT

      - name: Deploy configuration files
        if: steps.config_plan.outputs.should_deploy == 'true'
        env:
          DEPLOY_SSH_HOST: {{ '${{ secrets.DEPLOY_SSH_HOST }}' }}
          DEPLOY_SSH_USER: {{ '${{ secrets.DEPLOY_SSH_USER }}' }}
          DEPLOY_SSH_PORT: {{ '${{ secrets.DEPLOY_SSH_PORT }}' }}
        run: |
          set -euo pipefail

          MAP_FILE={{ '"${{ steps.config_plan.outputs.map_file }}"' }}

          if [ -z "$MAP_FILE" ] || [ ! -f "$MAP_FILE" ]; then
            echo "Configuration map file not found." >&2
            exit 1
          fi

          : "${DEPLOY_SSH_HOST:?Set DEPLOY_SSH_HOST}"
          : "${DEPLOY_SSH_USER:?Set DEPLOY_SSH_USER}"

          SSH_PORT="${DEPLOY_SSH_PORT:-22}"
          SSH_TARGET="${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"

          deployed_paths=()
          backup_flags=()

          rollback() {
            set +e
            if [ "${#deployed_paths[@]}" -eq 0 ]; then
              return
            fi
            echo "Deployment failed; rolling back configuration files." >&2
            for i in "${!deployed_paths[@]}"; do
              dest_path="${deployed_paths[$i]}"
              had_backup="${backup_flags[$i]}"
              if [ "$had_backup" = "1" ]; then
                ssh -p "$SSH_PORT" "$SSH_TARGET" "if [ -f '${dest_path}.bak' ]; then mv '${dest_path}.bak' '${dest_path}'; fi"
              else
                ssh -p "$SSH_PORT" "$SSH_TARGET" "rm -f '${dest_path}'"
              fi
            done
          }

          trap 'rollback' ERR

          while IFS='|' read -r file_name target_path; do
            local_file="configurations/data/$file_name"
            if [ ! -f "$local_file" ]; then
              echo "Local file '$local_file' missing." >&2
              exit 1
            fi

            tmp_name="config-deploy.$(date +%s).$$.$RANDOM"
            remote_tmp="/tmp/${tmp_name}"

            echo "Uploading $local_file to $SSH_TARGET:${target_path}"
            scp -P "$SSH_PORT" "$local_file" "${SSH_TARGET}:${remote_tmp}"

            result=$(ssh -p "$SSH_PORT" "$SSH_TARGET" \
              "REMOTE_TMP='${remote_tmp}' REMOTE_PATH='${target_path}' LOCAL_BASENAME='${file_name}' bash -s" <<'REMOTE'
          set -euo pipefail
          trap 'rm -f "$REMOTE_TMP"' EXIT

          TARGET_PATH="$REMOTE_PATH"
          DEST_PATH="$TARGET_PATH"

          if [[ "$TARGET_PATH" == */ ]]; then
            DEST_PATH="${TARGET_PATH%/}/${LOCAL_BASENAME}"
          elif [ -d "$TARGET_PATH" ]; then
            DEST_PATH="${TARGET_PATH%/}/${LOCAL_BASENAME}"
          fi

          BACKUP_PATH="${DEST_PATH}.bak"
          BACKUP_EXISTS=0

          if [ -f "$DEST_PATH" ]; then
            cp "$DEST_PATH" "$BACKUP_PATH"
            BACKUP_EXISTS=1
          fi

          install -Dm644 "$REMOTE_TMP" "$DEST_PATH"
          printf '%s|%s\n' "$DEST_PATH" "$BACKUP_EXISTS"
          REMOTE
            )

            dest_path="${result%%|*}"
            backup_flag="${result##*|}"

            if [ -z "$dest_path" ]; then
              echo "Failed to resolve remote destination for '$file_name'." >&2
              exit 1
            fi

            deployed_paths+=("$dest_path")
            backup_flags+=("$backup_flag")
          done < "$MAP_FILE"

          for i in "${!deployed_paths[@]}"; do
            if [ "${backup_flags[$i]}" = "1" ]; then
              ssh -p "$SSH_PORT" "$SSH_TARGET" "rm -f '${deployed_paths[$i]}.bak'"
            fi
          done

          echo "Configuration deployment completed."

      - name: Trigger stack redeploy
        env:
          PORTAINER_URL: {{ '${{ vars.PORTAINER_URL }}' }}
        run: |
          set -eo pipefail

          if [ -z "${PORTAINER_URL:-}" ]; then
            echo "ERROR: PORTAINER_URL environment variable is not set"
            exit 2
          fi

          WEBHOOK_ID={{ '"${{ steps.webhook.outputs.webhook_id }}"' }}

          if [ -z "$WEBHOOK_ID" ]; then
            echo "ERROR: Webhook ID output is empty"
            exit 2
          fi

          echo "Triggering redeploy via webhook $WEBHOOK_ID"

          curl -sS -X POST \
            "$PORTAINER_URL/api/webhooks/$WEBHOOK_ID"
