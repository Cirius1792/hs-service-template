name: Template tests

on:
  push:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest
